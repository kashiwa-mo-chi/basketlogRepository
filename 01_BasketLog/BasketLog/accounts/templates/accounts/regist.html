{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント登録</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}">
</head>

<body>

<div class="login">
  <h2>バスケログ - アカウント登録</h2>
  
    <form method='POST' action="">
    {% csrf_token %} 

    {% if form.non_field_errors %}
      <div style="color: #ef4444; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold;">
        {{ form.non_field_errors.0 }}
      </div>
    {% endif %}

    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}" class="form-label">
            {{ field.label }}
        </label>
        
        <!-- ⭕ 修正ポイント2：通常のinputタグではなく、Django標準のウィジェット（HTML構造）を自動で出力させます -->
        <!-- これにより、パスワード入力時に文字が「●●●」と伏せ字になり、安全性とスマホ用のクラスが両立します -->
        {{ field }}
        
        <!-- 各入力欄ごとの個別エラーメッセージを表示 -->
        {% if field.errors %}
          <div style="color: #ef4444; font-size: 0.8rem; margin-top: 4px;">
            {{ field.errors.0 }}
          </div>
        {% endif %}
      </div>
    {% endfor %}

    <button type="submit" class="btn-login">アカウント登録</button>

    <div class="register-link">
      <a href="{% url 'accounts:user_login' %}">ログイン画面へ</a>
    </div>

    <div class="guest-login">
      <a href="{% url 'accounts:home' %}">アカウント登録しないで利用する</a>
    </div>
    
  </form>
</div>

</body>
</html>
