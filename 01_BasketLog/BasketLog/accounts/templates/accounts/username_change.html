{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">

    <h2 class="mb-4">ユーザ名変更</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            変更する
        </button>

        <a href="{% url 'accounts:mypage' %}" class="btn btn-secondary">
            戻る
        </a>

    </form>

</div>
{% endblock %}
