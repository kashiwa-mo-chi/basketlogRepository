{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン画面</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}">
</head>

<body>

<div class="login">
  <h2>バスケログ</h2>
  <form method='POST' action="{% url 'accounts:user_login' %}">
    {% csrf_token %} 

  
    <div class="form-group">
      <label for="email" class="form-label">メールアドレス</label>
      <input type="email" id="email" name="user_name" class="form-control" placeholder="your@email.com" required>
    </div>

    <div class="form-group">
      <label for="password" class="form-label">パスワード</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="パスワードを入力" required>
    </div>
    


    <button type="submit" class="btn-login">ログイン</button>
    <div class="regist-link">
      <a href="#">アカウント登録</a>
    </div>

    <div class="guest-login">
      <a href="./index.html">アカウント登録しないで利用する</a>
    </div>
  </form>
</div>
   
</body>
</html>
