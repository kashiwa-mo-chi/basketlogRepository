{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント登録</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}">
</head>

<body>

<div class="login">
  <h2>バスケログ</h2>
  <form method='POST' action="{% url 'accounts:user_login' %}">
    {% csrf_token %} 

    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}" class="form-label">
            {{ field.label }}
        </label>
        <!-- 💡 入力欄に、ログイン画面と同じスマホ用の「form-control」クラスを適用します -->
        <input type="{{ field.field.widget.input_type }}" 
               id="{{ field.id_for_label }}" 
               name="{{ field.html_name }}" 
               class="form-control" 
              placeholder="{{ field.label }}を入力" 
               {% if field.field.required %}required{% endif %}>
        
        <!-- エラーメッセージがある場合は表示 -->
        {% if field.errors %}
          <div style="color: #ef4444; font-size: 0.8rem; margin-top: 4px;">
            {{ field.errors.0 }}
          </div>
        {% endif %}
      </div>
    {% endfor %}

    <button type="submit" class="btn-login">アカウント登録</button>

    <div class="register-link">
      <a href="{% url 'accounts:user_login' %}">ログイン画面へ</a>
    </div>

    <div class="guest-login">
      <a href="{% url 'accounts:home' %}">アカウント登録しないで利用する</a>
    </div>
    
  </form>
</div>

</body>
</html>
